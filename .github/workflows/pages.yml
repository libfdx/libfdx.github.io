name: Pages

on:
  workflow_dispatch:
    inputs:
      libfdx_ref:
        description: libfdx branch, tag, or commit to build.
        required: false
        default: master
  repository_dispatch:
    types:
      - pages
      - project-generator-pages
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  LIBFDX_REF: ${{ github.event.inputs.libfdx_ref || github.event.client_payload.ref || 'master' }}

jobs:
  deploy:
    name: Build and Deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout website source
        uses: actions/checkout@v6
        with:
          path: website

      - name: Checkout libfdx source
        uses: actions/checkout@v6
        with:
          repository: libfdx/libfdx
          ref: ${{ env.LIBFDX_REF }}
          path: source

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: latest

      - name: Use local libfdx source dependencies
        working-directory: source
        run: |
          {
            echo "development.usePublishedLibfdx=false"
            echo "development.publishedLibfdxVersion=-SNAPSHOT"
          } > local.properties

      - name: Stage Pages web outputs
        working-directory: source
        run: |
          chmod +x ./gradlew
          ./gradlew stage_pages --console=plain

      - name: Compose Pages site
        run: |
          rm -rf site
          mkdir -p site
          rsync -a --delete --exclude='.git' --exclude='.github' website/ site/
          cp -a source/build/pages/. site/
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
